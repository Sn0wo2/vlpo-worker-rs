name = "vlpo-worker-rs"
main = "build/index.js"
compatibility_date = "2026-03-20"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[placement]
mode = "smart"

[build]
command = "cargo install worker-build && worker-build --release"

